<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Game "Змейка"</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/media.css">
</head>
<body>
  <section class="sea">
    <div class="snake__score">
      Счёт: <p class="snake__score-number">0</p>
    </div>
    <div class="area">
      <div class="area-wrapper">
        <div class="river__up">
          <img src="images/riverUP.png" alt="">
        </div>
        <div class="snake">
          <div class="snake__headWrapper">
            
            <div class="snake__head snake__body"><div class="eya"></div><div class="eya"></div></div>
          </div>
      
          
          <div class="snake__segment snake__body snake__body-crocodily"> </div>
            <div class="snake__segment snake__body"> </div>
            <div class="snake__segment snake__body"> </div>
            <div class="snake__segment snake__body"> </div>
        </div>
        <div class="fence__inner">
          <div class="fence__item">
            <img src="images/fence.png" alt="">
          </div>
          <div class="fence__item">
            <img src="images/fence.png" alt="">
          </div>
          <div class="fence__item">
            <img src="images/fence.png" alt="">
          </div>
          <div class="fence__item">
            <img src="images/fence.png" alt="">
          </div>
          <div class="fence__item">
            <img src="images/fence.png" alt="">
          </div>
          
        </div>
        
        
      </div>
    </div>
  </section>
  <div class="modal-result-wrapper">
  	
  	<div id="modal-window">
  		<div id="content">Игра "Змейка"</div>
  		<button class="startGame">Старт</button>
  	</div>
  </div>
  <div class="mobile-controls">
 
    <button data-dir="ArrowUp">
    ▲
    </button>
   
    <div>
   
      <button data-dir="ArrowLeft">
      ◀
      </button>
   
      <button data-dir="ArrowDown">
      ▼
      </button>
   
      <button data-dir="ArrowRight">
      ▶
      </button>
   
    </div>
   
  </div>
  <script src="js/main.js"></script>
</body>
</html>
